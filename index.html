
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </header>
    <main>
        <button id="generator-btn">Generate Numbers</button>
        <div id="lotto-balls-container"></div>
        
        <section id="contact-section">
            <hr>
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xvzwjqvz" method="POST">
                <div class="form-group">
                    <label for="email">Your Email:</label>
                    <input type="email" name="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea name="message" id="message" required placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </section>
    </main>
    <section id="disqus-section">
        <div id="disqus_thread"></div>
        <script>
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://foremost-1.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
    <footer>
        <p>Good luck!</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
